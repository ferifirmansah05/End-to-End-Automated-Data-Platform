# ─────────────────────────────────────────────────────────────
#  Tambahkan service ini ke dalam docker-compose.yml yang sudah
#  ada bersama stack Kafka / ClickHouse / Airflow, dll.
# ─────────────────────────────────────────────────────────────
version: "3.9"

services:

  # ── ERP Analytics Dashboard ────────────────────────────────
  erp-dashboard:
    build:
      context: ./dashboard          # folder berisi Dockerfile
      dockerfile: Dockerfile
    container_name: erp-dashboard
    restart: unless-stopped
    ports:
      - "8050:8050"
    environment:
      # Sesuaikan dengan nama service ClickHouse di docker-compose kamu
      CLICKHOUSE_HOST:     clickhouse
      CLICKHOUSE_PORT:     "9000"
      CLICKHOUSE_DATABASE: default
      CLICKHOUSE_USER:     default
      CLICKHOUSE_PASSWORD: ""       # isi jika ada password
      REFRESH_INTERVAL_MS: "60000"  # auto-refresh tiap 60 detik
    depends_on:
      - clickhouse                  # nama service ClickHouse kamu
    networks:
      - erp-net                     # samakan dengan network yang dipakai stack lain

# ── Pastikan network ini sudah di-declare di file utama ───────
networks:
  erp-net:
    external: true                  # atau hapus baris ini jika belum ada
